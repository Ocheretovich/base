[package]
name = "base-prover-nitro-host"
description = "TEE prover host server (AWS Nitro Enclaves)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-prover-nitro-host"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
eyre.workspace = true
tracing.workspace = true
base-cli-utils.workspace = true
base-proof-tee-nitro-host.workspace = true
base-consensus-registry.workspace = true
base-proof-tee-nitro-enclave.workspace = true
tokio = { workspace = true, features = ["full"] }
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }
base-proof-host = { workspace = true, features = ["metrics"] }

[features]
local = []
