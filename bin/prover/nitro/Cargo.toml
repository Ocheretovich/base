[package]
name = "base-prover-nitro"
description = "TEE prover server (AWS Nitro Enclaves)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-prover-nitro"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# Workspace – TEE
base-consensus-registry.workspace = true
base-proof-host = { workspace = true, features = ["metrics"] }
base-proof-tee-nitro = { workspace = true, features = ["host"] }

# CLI
eyre.workspace = true
base-cli-utils.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }

# Async
tokio = { workspace = true, features = ["full"] }

# Tracing
tracing.workspace = true

[features]
local = []
