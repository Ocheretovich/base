[package]
name = "base-prover"
description = "Prover server (TEE + ZK)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-prover"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# Workspace – TEE
base-consensus-registry.workspace = true
base-proof-host = { workspace = true, features = ["metrics"] }
base-proof-tee-nitro = { workspace = true, features = ["host"] }

# Workspace – ZK
base-zk-db.workspace = true
base-zk-outbox.workspace = true
base-zk-service.workspace = true
base-zk-client = { workspace = true, features = ["server"] }

# CLI
eyre.workspace = true
base-cli-utils.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }

# Async
futures.workspace = true
tokio = { workspace = true, features = ["full"] }

# gRPC
tonic.workspace = true

# Tracing
tracing.workspace = true

[features]
local = []
